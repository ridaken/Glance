name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run compile

      - name: Unit tests
        run: npm test

      - name: Build (Chrome MV3)
        run: npm run build

      - name: Build (Firefox MV2)
        run: npm run build:firefox

  publish:
    name: Publish rolling build to GitHub Releases
    runs-on: ubuntu-latest
    needs: check
    # Only after a successful merge/push to main — never on pull requests.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Zip (Chrome MV3)
        run: npm run zip

      - name: Zip (Firefox MV2)
        run: npm run zip:firefox

      # Maintain a single rolling "latest" pre-release whose assets are the
      # freshest importable packages. Delete + recreate so the `latest` tag
      # always points at the commit that was actually built.
      - name: Publish "latest" rolling pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > release-notes.md <<EOF
          Importable extension packages, built automatically from the latest commit on main (${GITHUB_SHA:0:7}).

          - Firefox (MV2): glance-*-firefox.zip
          - Chrome / Chromium (MV3): glance-*-chrome.zip

          This pre-release is overwritten on every merge to main.
          EOF

          gh release delete latest --cleanup-tag --yes || true
          gh release create latest \
            --target "$GITHUB_SHA" \
            --title "Latest main build" \
            --prerelease \
            --notes-file release-notes.md \
            .output/glance-*-chrome.zip .output/glance-*-firefox.zip
