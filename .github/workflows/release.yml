name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    name: Build & attach store packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Zip (Chrome MV3)
        run: npm run zip

      - name: Zip (Firefox MV2)
        run: npm run zip:firefox

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: glance-packages
          path: .output/*.zip
          if-no-files-found: error

      - name: Attach packages to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: .output/*.zip
